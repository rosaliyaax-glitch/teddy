<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>yo. 🧸💚</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="cursor"></div>

<div id="sparkles"></div>



<!-- PAGE 1: SCRAPBOOK COVER -->

<section id="cover">


    <!-- hand drawn doodles -->

    <div class="doodle cat">
        <div class="cat-head"></div>
        <div class="cat-ear left"></div>
        <div class="cat-ear right"></div>
        <div class="cat-face"></div>
    </div>


    <div class="doodle tapir">
        <div class="tapir-body"></div>
        <div class="tapir-snout"></div>
    </div>


    <div class="doodle flower">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="stem"></div>
    </div>


    <div class="doodle star">
        ✧
    </div>


    <div class="doodle heart">
        ♡
    </div>


    <div class="doodle cloud">
        ☁
    </div>



    <div class="scrapbook">


        <div class="tiny-label">
            secret page found ✎
        </div>


        <h1>
            yo.
        </h1>


        <p>
            you found something 👀
        </p>


        <div class="scribbles">
            ~ ♡ ✦ ~
        </div>


        <p class="small-note">
            "a tiny memory hidden here"
        </p>


    </div>


</section>







<!-- PAGE 2: GARDEN -->

<section id="garden">


    <div class="garden-doodles">

        <div class="leaf"></div>
        <div class="flower-line"></div>

    </div>



    <h1>
        secret garden unlocked 🌿
    </h1>


    <p>
        okay okay... you know what to do 🤨
    </p>


    <button id="dabButton">
        dab me up
    </button>


    <div class="energy">

        <div id="energyBar"></div>

    </div>


</section>









<!-- PAGE 3: LETTER -->


<section id="letter">


<div class="paper">


    <div class="tape"></div>


    <div class="pressedRose">

    </div>



    <h2>
        hey, lil teddy bear 🧸💚
    </h2>


    <p id="typing"></p>


    <button id="flip">
        turn the page 💗
    </button>


</div>


</section>









<!-- FINAL PAGE -->


<section id="ending">


<div class="bouquet"></div>


<div class="teddy"></div>


<div class="arrow"></div>


<div id="heartRain"></div>


<h1>
you found the last page 💗
</h1>


</section>






<audio id="music" loop>

<source src="music/melody.mp3" type="audio/mpeg">

</audio>



<script src="script.js"></script>


</body>

</html>
